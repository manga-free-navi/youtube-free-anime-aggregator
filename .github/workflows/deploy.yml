name: Deploy to GitHub Pages

on:
  schedule:
    # 毎日 AM 6:00 (UTC 21:00) に自動更新
    - cron: '0 21 * * *'
  workflow_dispatch: # 手動実行可能

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Scraper
        run: node src/scraper/run-scraper.js
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          NEXT_PUBLIC_RAKUTEN_AFFILIATE_ID: ${{ secrets.NEXT_PUBLIC_RAKUTEN_AFFILIATE_ID }}

      - name: Build Next.js Web App
        run: npm run build
        env:
          NEXT_PUBLIC_RAKUTEN_AFFILIATE_ID: ${{ secrets.NEXT_PUBLIC_RAKUTEN_AFFILIATE_ID }}
          NEXT_PUBLIC_MANGA_SITE_URL: ${{ secrets.NEXT_PUBLIC_MANGA_SITE_URL }}
          NEXT_PUBLIC_ANIME_SITE_URL: ${{ secrets.NEXT_PUBLIC_ANIME_SITE_URL }}
          NEXT_PUBLIC_GAME_SITE_URL: ${{ secrets.NEXT_PUBLIC_GAME_SITE_URL }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
